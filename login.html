<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>success bank - sign in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'inter', -apple-system, blinkmacsystemfont, "segoe ui", roboto, sans-serif;
        }

        .login-body {
            background: #f4f7f6;
            min-height: 100vh;
        }

        .login-page-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .login-hero-side {
            flex: 1.2;
            background: linear-gradient(rgba(11, 70, 37, 0.85), rgba(7, 47, 24, 0.9)), 
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .hero-brand {
            text-align: center;
            color: #ffffff;
        }

        .leaf-logo {
            width: 90px;
            height: 90px;
            background-color: #114e2c;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 24px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .leaf-logo.small {
            width: 60px;
            height: 60px;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .hero-brand h1 {
            font-size: 36px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .hero-brand p {
            font-size: 16px;
            color: #cbd5e1;
            margin-top: 8px;
        }

        .login-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            padding: 40px;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
        }

        .mobile-logo-header {
            display: none;
            text-align: center;
            margin-bottom: 30px;
        }

        .mobile-logo-header h2 {
            color: #0b4625;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .login-titles h3 {
            font-size: 28px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-titles p {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .web-input-group {
            margin-bottom: 24px;
        }

        .web-input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            border-color: #0b4625;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 70, 37, 0.1);
        }

        .login-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            cursor: pointer;
        }

        .forgot-link {
            color: #0b4625;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .web-primary-btn {
            width: 100%;
            background-color: #0b4625;
            color: #ffffff;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .web-primary-btn:hover {
            background-color: #072f18;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 2000;
        }

        .modal-overlay.show-modal {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .modal-box p {
            font-size: 14px;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .modal-btn {
            width: 100%;
            background-color: #f1f5f9;
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 992px) {
            .login-hero-side { display: none; }
            .mobile-logo-header { display: block; }
        }
    </style>
</head>
<body class="login-body">

    <div class="login-page-container">
        <div class="login-hero-side">
            <div class="hero-overlay">
                <div class="hero-brand">
                    <div class="leaf-logo"><i class="fa-solid fa-leaf"></i></div>
                    <h1>SUCCESS BANK</h1>
                    <p>Securing your family's future</p>
                </div>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-box">
                <div class="mobile-logo-header">
                    <div class="leaf-logo small"><i class="fa-solid fa-leaf"></i></div>
                    <h2>SUCCESS BANK</h2>
                </div>

                <div class="login-titles">
                    <h3>Welcome Back</h3>
                    <p>Please enter your credentials to access your secure dashboard.</p>
                </div>

                <form id="secureLoginForm">
                    <div class="web-input-group">
                        <label for="usernameInput">Username</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="usernameInput" placeholder="Enter your username" required autocomplete="off">
                        </div>
                    </div>

                    <div class="web-input-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="login-actions-row">
                        <label class="remember-me"><input type="checkbox"> Remember device</label>
                        <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="web-primary-btn">Sign In to Dashboard</button>
                </form>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="systemModal">
        <div class="modal-box">
            <h3 id="modalTitle">Login Failed</h3>
            <p id="modalMessage">Invalid username or password.</p>
            <button id="modalCloseBtn" class="modal-btn">OK</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('secureLoginForm');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('loginPassword');
        const modal = document.getElementById('systemModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (usernameInput.value.trim() === 'hannahsc2000' && passwordInput.value === 'HS2024secure!') {
                window.location.href = 'index.html';
            } else {
                modalTitle.innerText = "Login Failed";
                modalMessage.innerText = "Invalid username or password. Please try again.";
                modal.classList.add('show-modal');
            }
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            modalTitle.innerText = "Reset Password";
            modalMessage.innerText = "Please contact your branch manager to verify your identity and reset your credentials.";
            modal.classList.add('show-modal');
        });

        modalCloseBtn.addEventListener('click', () => modal.classList.remove('show-modal'));
    </script>
</body>
</html>
